<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-auth-compat.js"></script>

</head>

<body>

<div id="site-header"></div>

<div class="container">

    <h2 class="section-title">

        Admin Dashboard

    </h2>

    <div class="dashboard-grid">

        <div class="dashboard-card">

            <h3>📚 Course Management</h3>

            <p>Manage all training courses.</p>

            <button id="btnManageCourses" class="btn">

                Manage Courses

            </button>

        </div>

        <div class="dashboard-card">

            <h3>⭐ Review Management</h3>

            <p>View all reviews submitted by users.</p>

            <button id="btnReviews" class="btn">

                View Reviews

            </button>

        </div>

        <div class="dashboard-card">

            <h3>👤 User Management</h3>

            <p>View all registered users.</p>

            <button id="btnUsers" class="btn">

                View Users

            </button>

        </div>

    </div>

    <br>

    <div id="adminContent">

    </div>

</div>

<div id="site-footer"></div>

<script src="services/supabase.js"></script>

<script src="js/firebase.js"></script>

<script src="js/auth.js"></script>

<script src="components/header.js"></script>

<script src="components/footer.js"></script>

<script src="js/admin.js"></script>

</body>

</html>
