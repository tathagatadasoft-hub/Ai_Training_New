<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Library</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        .glass {
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.8);
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-600 via-blue-600 to-cyan-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-10">
            <h1 class="text-4xl font-bold">
                Training Knowledge Hub
            </h1>

            <p class="mt-2 text-blue-100">
                Browse training materials directly from Supabase
            </p>
        </div>
    </header>

    <!-- Search Section -->
    <section class="max-w-7xl mx-auto px-6 py-8">
        <div class="glass rounded-2xl shadow-lg p-6">

            <div class="flex flex-col md:flex-row gap-4">

                <input
                    type="text"
                    id="searchBox"
                    placeholder="Search by title or technology..."
                    class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >

                <button
                    onclick="loadTrainingData()"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl transition"
                >
                    Refresh
                </button>

            </div>

        </div>
    </section>

    <!-- Stats -->
    <section class="max-w-7xl mx-auto px-6 mb-4">
        <div class="text-slate-600">
            Total Trainings:
            <span id="recordCount" class="font-bold">0</span>
        </div>
    </section>

    <!-- Training Cards -->
    <section class="max-w-7xl mx-auto px-6 pb-10">
        <div
            id="trainingContainer"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        >
            <!-- Data Loads Here -->
        </div>
    </section>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden text-center py-10">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mx-auto"></div>
    </div>

<script>

const SUPABASE_URL = "https://kxfvygnmcgvzsizwwlop.supabase.co";

const SUPABASE_KEY =
"sb_publishable_KPc7MdTlw9p79t1YGboASg_y94Ct98v";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

console.log("Supabase Connected");

let allData = [];

async function loadTrainingData() {

document.getElementById("loading").classList.remove("hidden");

const { data, error } = await supabaseClient
    .from("trainingdata")
    .select("*");

console.log("DATA:", data);
console.log("ERROR:", error);

document.getElementById("loading").classList.add("hidden");

if (error) {

    document.getElementById("trainingContainer").innerHTML = `
        <div class="text-red-600 font-semibold">
            Failed to load data: ${error.message}
        </div>
    `;

    return;
}

allData = data || [];

renderCards(allData);

}

function renderCards(data) {

    document.getElementById("recordCount").innerText = data.length;

    const container = document.getElementById("trainingContainer");

    if (data.length === 0) {

        container.innerHTML = `
            <div class="text-slate-500">
                No records found.
            </div>
        `;

        return;
    }

    container.innerHTML = data.map(item => `
        <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition p-6">

            <div class="flex justify-between items-start mb-4">

                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-medium">
                    ${item.tech || "General"}
                </span>

            </div>

            <h2 class="text-xl font-bold text-slate-800 mb-3">
                ${item.title}
            </h2>

            <p class="text-slate-600 mb-5">
                ${item.desc || ""}
            </p>

            <a
                href="${item.link}"
                target="_blank"
                class="inline-flex items-center bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition"
            >
                Open Training →
            </a>

        </div>
    `).join("");
}

document
.getElementById("searchBox")
.addEventListener("keyup", function () {

    const keyword = this.value.toLowerCase();

    const filtered = allData.filter(item =>

        (item.title || "")
        .toLowerCase()
        .includes(keyword)

        ||

        (item.tech || "")
        .toLowerCase()
        .includes(keyword)
    );

    renderCards(filtered);
});

loadTrainingData();

</script>

</body>
</html>
