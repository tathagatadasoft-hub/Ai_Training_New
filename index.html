<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Welcome to GitHub Training from Web</title>

    <!-- Common CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Firebase Compatibility SDK -->

    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-analytics-compat.js"></script>
    
</head>

<body>

<div id="site-header"></div>

<div class="container">

    <h2 class="section-title">

        Available Training Programs

    </h2>

    <div id="training-list">

        <div class="loading">

            Loading training data...

        </div>

    </div>

</div>

<!-- ============================= -->
<!-- Review Modal -->
<!-- ============================= -->

<div id="reviewModal" class="modal">

    <div class="modal-content">

        <span
            id="closeReviewModal"
            class="close">

            &times;

        </span>

        <h2 id="reviewCourseTitle">

        </h2>

        <input
            type="hidden"
            id="reviewCourseId">

        <br>

        <label>

            Rating

        </label>

        <select id="reviewRating">

            <option value="5">⭐⭐⭐⭐⭐</option>

            <option value="4">⭐⭐⭐⭐</option>

            <option value="3">⭐⭐⭐</option>

            <option value="2">⭐⭐</option>

            <option value="1">⭐</option>

        </select>

        <br><br>

        <textarea

            id="reviewText"

            placeholder="Write your review..."

            rows="6">

        </textarea>

        <br><br>

        <button

            class="btn"

            id="btnSubmitReview">

            Submit Review

        </button>

    </div>

</div>
    
<div id="site-footer"></div>

<script src="services/supabase.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script src="js/app.js"></script>
<script src="components/header.js"></script>
<script src="components/footer.js"></script>

</body>

</html>
